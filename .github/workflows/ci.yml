name: Trade Reconciliation CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-reconciliation-workflow:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run reconciliation workflow
        run: |
          make run

      - name: Generate sample report preview
        run: |
          make preview

      - name: Run tests
        run: |
          pytest
